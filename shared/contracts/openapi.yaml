  /admin/support/users:
    get:
      summary: Admin support lookup by device id
      security:
        - adminApiKey: []
      parameters:
        - in: query
          name: deviceId
          required: true
          schema:
            type: string
        - in: query
          name: installId
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Device-scoped support snapshot with entitlement, subscription, diagnostics, and API errors
        "401":
          description: Missing or invalid admin API key
  /admin/support/devices/{deviceId}:
    get:
      summary: Admin device/session support lookup
      security:
        - adminApiKey: []
      parameters:
        - in: path
          name: deviceId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device-scoped support snapshot
        "401":
          description: Missing or invalid admin API key
  /admin/support/subscriptions/{deviceId}:
    get:
      summary: Admin subscription and entitlement lookup
      security:
        - adminApiKey: []
      parameters:
        - in: path
          name: deviceId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device-scoped entitlement/subscription snapshot
        "401":
          description: Missing or invalid admin API key
  /admin/support/entitlements/manual-adjust:
    post:
      summary: Admin manual entitlement adjustment
      security:
        - adminApiKey: []
      responses:
        "200":
          description: Entitlement updated and support audit event recorded
        "401":
          description: Missing or invalid admin API key
  /admin/support/tickets/metadata:
    post:
      summary: Admin support ticket metadata event
      security:
        - adminApiKey: []
      responses:
        "201":
          description: Support ticket metadata stored as a support event
        "401":
          description: Missing or invalid admin API key
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminApiKey:
      type: apiKey
      in: header
      name: x-admin-api-key
  schemas:
    AppCompatibility:
      type: object
      required:
        - platform
        - currentVersionName
        - currentVersionCode
        - minimumSupportedVersionName
        - minimumSupportedVersionCode
        - latestVersionName
        - latestVersionCode
        - status
        - updateRequired
        - updateRecommended
        - message
      properties:
        platform:
          type: string
          enum:
            - android
        currentVersionName:
          type: string
        currentVersionCode:
          type: integer
        minimumSupportedVersionName:
          type: string
        minimumSupportedVersionCode:
          type: integer
        latestVersionName:
          type: string
        latestVersionCode:
          type: integer
        status:
          type: string
          enum:
            - compatible
            - update_recommended
            - update_required
        updateRequired:
          type: boolean
        updateRecommended:
          type: boolean
        message:
          type: string
        downloadUrl:
          type:
            - string
            - "null"
          format: uri
    DeviceSessionRequest:
      type: object
      required:
        - deviceId
        - installId
      properties:
        deviceId:
          type: string
        installId:
          type: string
        appVersion:
          type: string
    EntitlementSnapshot:
      type: object
      required:
        - plan
        - status
        - source
        - productId
        - currentPeriodEndsAt
        - features
      properties:
        plan:
          type: string
          enum:
            - starter
            - pro
            - creator
        status:
          type: string
        source:
          type: string
        productId:
          type:
            - string
            - "null"
        currentPeriodEndsAt:
          type:
            - string
            - "null"
          format: date-time
        features:
          type: object
          required:
            - customBotName
            - channelProfiles
            - commandProfiles
            - timedMessages
            - localHistoryLimit
            - cloudBackups
            - discordAlerts
            - obsOverlay
            - teamSeats
            - emergencyMode
            - advancedFilters
            - presetBundles
            - aiSuggestions
            - aiSuggestionDailyLimit
          properties:
            customBotName:
              type: boolean
            channelProfiles:
              type: integer
              minimum: 1
            commandProfiles:
              description: Number of command profiles allowed, or null when the plan is uncapped.
              type:
                - integer
                - "null"
              minimum: 0
            timedMessages:
              description: Number of timed messages allowed, or null when the plan is uncapped.
              type:
                - integer
                - "null"
              minimum: 0
            localHistoryLimit:
              description: Maximum local Room log and viewer-history rows the Android dashboard should expose for the active plan.
              type: integer
              minimum: 1
            cloudBackups:
              type: boolean
            discordAlerts:
              type: boolean
            obsOverlay:
              description: Whether the account can configure tokenized OBS/browser overlays.
              type: boolean
            teamSeats:
              type: integer
              minimum: 1
            emergencyMode:
              type: boolean
            advancedFilters:
              type: boolean
            presetBundles:
              type: boolean
            aiSuggestions:
              type: boolean
            aiSuggestionDailyLimit:
              description: Maximum manual review-assistant suggestions allowed per UTC day for the active plan.
              type: integer
              minimum: 0
    OverlayConfigUpdate:
      type: object
      additionalProperties: false
      properties:
        enabled:
          type: boolean
        theme:
          type: string
          enum:
            - control_room
            - transparent_minimal
            - high_contrast
        activeSessionId:
          type:
            - string
            - "null"
        showModerationActions:
          type: boolean
        showRuntimeStatus:
          type: boolean
        showViewerStats:
          type: boolean
        showRecentChat:
          description: Off by default so public overlay URLs do not expose chat text unless the creator opts in.
          type: boolean
    OverlayConfig:
      type: object
      required:
        - profileId
        - configured
        - enabled
        - theme
        - activeSessionId
        - showModerationActions
        - showRuntimeStatus
        - showViewerStats
        - showRecentChat
        - tokenPreview
        - createdAt
        - updatedAt
      properties:
        profileId:
          type: string
        configured:
          type: boolean
        enabled:
          type: boolean
        theme:
          type: string
          enum:
            - control_room
            - transparent_minimal
            - high_contrast
        activeSessionId:
          type:
            - string
            - "null"
        showModerationActions:
          type: boolean
        showRuntimeStatus:
          type: boolean
        showViewerStats:
          type: boolean
        showRecentChat:
          type: boolean
        tokenPreview:
          type:
            - string
            - "null"
        createdAt:
          type:
            - string
            - "null"
          format: date-time
        updatedAt:
          type:
            - string
            - "null"
          format: date-time
        allowed:
          type: boolean
        requiredPlan:
          type:
            - string
            - "null"
    OverlayConfigMutation:
      allOf:
        - $ref: "#/components/schemas/OverlayConfig"
        - type: object
          required:
            - publicUrl
            - publicPath
            - tokenRotated
          properties:
            publicUrl:
              type:
                - string
                - "null"
              format: uri
            publicPath:
              type:
                - string
                - "null"
            tokenRotated:
              type: boolean
    OverlayState:
      type: object
      required:
        - generatedAt
        - enabled
        - status
        - overlay
        - session
        - metrics
        - recentActions
        - recentRuntimeEvents
        - recentMessages
      properties:
        generatedAt:
          type: string
          format: date-time
        enabled:
          type: boolean
        status:
          type: string
          enum:
            - disabled
            - waiting_for_stream
            - live
            - ended
        overlay:
          type: object
        session:
          type:
            - object
            - "null"
        metrics:
          type: object
          required:
            - messages
            - uniqueChatters
            - moderationActions
            - destructiveActions
            - spamAttempts
            - commandsSent
            - timersSent
            - reconnectEvents
          properties:
            messages:
              type: integer
            uniqueChatters:
              type: integer
            moderationActions:
              type: integer
            destructiveActions:
              type: integer
            spamAttempts:
              type: integer
            commandsSent:
              type: integer
            timersSent:
              type: integer
            reconnectEvents:
              type: integer
        recentActions:
          type: array
          items:
            type: object
        recentRuntimeEvents:
          type: array
          items:
            type: object
        recentMessages:
          type: array
          items:
            type: object
    TeamMemberPermissions:
      type: object
      required:
        - viewQueue
        - moderate
        - manageWarnings
        - viewAnalytics
      properties:
        viewQueue:
          type: boolean
        moderate:
          type: boolean
        manageWarnings:
          type: boolean
        viewAnalytics:
          type: boolean
    TeamInviteCreate:
      type: object
      required:
        - displayName
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 80
        role:
          type: string
          enum:
            - moderator
            - producer
          default: moderator
        permissions:
          $ref: "#/components/schemas/TeamMemberPermissions"
    TeamInviteRedeem:
      type: object
      required:
        - inviteCode
      properties:
        inviteCode:
          type: string
          minLength: 12
          maxLength: 120
        displayName:
          type: string
          minLength: 1
          maxLength: 80
    TeamMember:
      type: object
      required:
        - id
        - profileId
        - displayName
        - role
        - status
        - inviteCodePreview
        - memberDeviceId
        - permissions
        - acceptedAt
        - revokedAt
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
        profileId:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum:
            - moderator
            - producer
        status:
          type: string
          enum:
            - invited
            - active
            - revoked
        inviteCodePreview:
          type: string
        memberDeviceId:
          type:
            - string
            - "null"
        permissions:
          $ref: "#/components/schemas/TeamMemberPermissions"
        acceptedAt:
          type:
            - string
            - "null"
          format: date-time
        revokedAt:
          type:
            - string
            - "null"
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TeamInviteResult:
      type: object
      required:
        - member
        - inviteCode
      properties:
        member:
          $ref: "#/components/schemas/TeamMember"
        inviteCode:
          description: Full invite code returned only at creation time. Store or share it immediately.
          type: string
    TeamMembership:
      allOf:
        - $ref: "#/components/schemas/TeamMember"
        - type: object
          required:
            - profileName
            - channelId
            - ownerDeviceId
          properties:
            profileName:
              type: string
            channelId:
              type: string
            ownerDeviceId:
              type: string
    FaqEntryInput:
      type: object
      required:
        - profileId
        - question
        - answer
        - keywords
        - enabled
      properties:
        profileId:
          type: string
        question:
          type: string
          minLength: 3
          maxLength: 160
        answer:
          description: Creator-provided reply text safe for YouTube Live chat.
          type: string
          minLength: 1
          maxLength: 200
        keywords:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 2
            maxLength: 40
        enabled:
          type: boolean
    FaqEntry:
      allOf:
        - $ref: "#/components/schemas/FaqEntryInput"
        - type: object
          required:
            - id
            - createdAt
            - updatedAt
          properties:
            id:
              type: string
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    FaqReplySuggestionRequest:
      type: object
      required:
        - profileId
        - message
      properties:
        profileId:
          type: string
        message:
          type: object
          required:
            - text
          properties:
            text:
              type: string
              minLength: 1
              maxLength: 2000
            authorName:
              type: string
              maxLength: 120
        minConfidence:
          type: number
          minimum: 0
          maximum: 1
          default: 0.45
    FaqReplySuggestionResult:
      type: object
      required:
        - provider
        - matched
        - manualApprovalRequired
        - entryId
        - question
        - replyText
        - confidence
        - matchedKeywords
        - explanation
      properties:
        provider:
          type: string
          enum:
            - local-heuristic
        matched:
          type: boolean
        manualApprovalRequired:
          type: boolean
          enum:
            - true
        entryId:
          type:
            - string
            - "null"
        question:
          type:
            - string
            - "null"
        replyText:
          type:
            - string
            - "null"
        confidence:
          type: number
          minimum: 0
          maximum: 1
        matchedKeywords:
          type: array
          items:
            type: string
        explanation:
          type: string
    TimerInput:
      type: object
      required:
        - profileId
        - name
        - message
        - intervalMinutes
      properties:
        profileId:
          type: string
        name:
          type: string
          maxLength: 80
        message:
          type: string
          maxLength: 500
        intervalMinutes:
          type: integer
          minimum: 1
          maximum: 240
        minChatMessages:
          type: integer
          minimum: 0
          maximum: 500
        quietStartMinutes:
          type:
            - integer
            - "null"
          minimum: 0
          maximum: 1440
        quietEndMinutes:
          type:
            - integer
            - "null"
          minimum: 1
          maximum: 1440
        enabled:
          type: boolean
    TimerPatch:
      type: object
      properties:
        name:
          type: string
          maxLength: 80
        message:
          type: string
          maxLength: 500
        intervalMinutes:
          type: integer
          minimum: 1
          maximum: 240
        minChatMessages:
          type: integer
          minimum: 0
          maximum: 500
        quietStartMinutes:
          type:
            - integer
            - "null"
          minimum: 0
          maximum: 1440
        quietEndMinutes:
