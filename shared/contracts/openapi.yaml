openapi: 3.1.0
info:
  title: ChatMod Mobile API
  version: 0.1.0
  description: Backend contract for the phone-hosted YouTube Live moderation bot.
servers:
  - url: http://localhost:4100
paths:
  /health:
    get:
      summary: Service health
      responses:
        "200":
          description: API health payload
  /health/ready:
    get:
      summary: Service readiness
      responses:
        "200":
          description: API dependencies are ready or optional in this environment
        "503":
          description: Required dependency is unavailable
  /app/compatibility:
    get:
      summary: Check whether an Android app build is supported
      parameters:
        - in: query
          name: platform
          required: true
          schema:
            type: string
            enum:
              - android
        - in: query
          name: versionName
          required: true
          schema:
            type: string
        - in: query
          name: versionCode
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: App compatibility status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppCompatibility"
        "400":
          description: Invalid compatibility query
  /accounts/device-session:
    post:
      summary: Create or refresh a device session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceSessionRequest"
      responses:
        "200":
          description: Session payload
  /accounts/export:
    get:
      summary: Export account, profile, backup, support, API error, and entitlement data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account export payload without raw OAuth token secrets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountExport"
  /accounts/current:
    delete:
      summary: Delete the current account and associated cloud data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account deletion result
  /accounts/youtube/disconnect:
    post:
      summary: Disconnect stored YouTube OAuth account data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: YouTube disconnect result
  /entitlements/current:
    get:
      summary: Current subscription and feature entitlement
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current entitlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntitlementSnapshot"
  /entitlements/google-play/config:
    get:
      summary: Google Play billing configuration status
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Billing configuration status
  /entitlements/google-play/validate:
    post:
      summary: Validate a Google Play subscription purchase
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Entitlement updated from purchase validation
          content:
            application/json:
              schema:
                type: object
                required:
                  - validation
                  - entitlement
                properties:
                  validation:
                    type: object
                  entitlement:
                    $ref: "#/components/schemas/EntitlementSnapshot"
        "503":
          description: Google Play billing is not configured
  /profiles:
    get:
      summary: List channel profiles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile list
    post:
      summary: Create channel profile
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Profile created
        "403":
          description: Current plan channel profile limit reached
  /backups:
    get:
      summary: List cloud backups for the current account
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Account-scoped backup list
  /backups/moderation-profile:
    post:
      summary: Store a moderation profile backup
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Backup stored
  /backups/settings:
    post:
      summary: Store a validated command and timer settings backup
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Settings backup stored
  /backups/{id}:
    delete:
      summary: Delete a cloud backup for the current account
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Backup deleted
  /backups/{id}/restore:
    post:
      summary: Restore a settings backup into commands and timers
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings backup restored
        "403":
          description: Current plan command, timed-message, or channel profile limit reached
  /commands:
    get:
      summary: List custom commands
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Command list
    post:
      summary: Create custom command
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Command created
        "403":
          description: Current plan command limit reached
  /commands/evaluate:
    post:
      summary: Evaluate a chat message against stored commands
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Command evaluation result
  /commands/{id}:
    put:
      summary: Create or replace a custom command using a stable client id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Command upserted
        "403":
          description: Current plan command limit reached
    patch:
      summary: Update custom command
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Command updated
    delete:
      summary: Delete custom command
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Command deleted
  /commands/{id}/send:
    post:
      summary: Send a stored custom command response to a selected live chat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommandManualSendRequest"
      responses:
        "200":
          description: Command response sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommandManualSendResult"
  /faq-entries:
    get:
      summary: List Creator FAQ knowledge-base entries for a channel profile
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: profileId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: FAQ entry list
          content:
            application/json:
              schema:
                type: object
                required:
                  - faqEntries
                properties:
                  faqEntries:
                    type: array
                    items:
                      $ref: "#/components/schemas/FaqEntry"
        "403":
          description: Creator AI FAQ entitlement is required
  /faq-entries/suggest-reply:
    post:
      summary: Suggest a manual FAQ reply from creator-provided knowledge-base entries
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaqReplySuggestionRequest"
      responses:
        "200":
          description: Manual FAQ reply suggestion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaqReplySuggestionResult"
        "403":
          description: Creator AI FAQ entitlement is required
  /faq-entries/{id}:
    put:
      summary: Create or replace a Creator FAQ knowledge-base entry
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaqEntryInput"
      responses:
        "200":
          description: FAQ entry saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaqEntry"
        "403":
          description: Creator AI FAQ entitlement is required
    delete:
      summary: Delete a Creator FAQ knowledge-base entry
      security:
        - bearerAuth: []
      responses:
        "204":
          description: FAQ entry deleted
  /timers:
    get:
      summary: List timed messages
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Timer list
    post:
      summary: Create timed message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimerInput"
      responses:
        "201":
          description: Timer created
        "403":
          description: Current plan timed-message limit reached
  /timers/due:
    post:
      summary: Find timed messages due to send
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DueTimerRequest"
      responses:
        "200":
          description: Due timer list
  /timers/{id}:
    put:
      summary: Create or replace a timed message using a stable client id
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimerInput"
      responses:
        "200":
          description: Timer upserted
        "403":
          description: Current plan timed-message limit reached
    patch:
      summary: Update timed message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimerPatch"
      responses:
        "200":
          description: Timer updated
    delete:
      summary: Delete timed message
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Timer deleted
  /timers/{id}/mark-sent:
    post:
      summary: Mark a timed message as sent
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Timer updated
  /rule-presets:
    get:
      summary: List moderation rule presets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rule preset list
    post:
      summary: Create a moderation rule preset
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Rule preset created
        "403":
          description: Current plan channel profile limit or advanced-filter entitlement reached
  /rule-presets/export:
    get:
      summary: Export moderation rule presets as a portable ChatMod JSON bundle
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: profileId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rule preset export bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulePresetExportBundle"
  /rule-presets/import:
    post:
      summary: Import moderation rule presets from a portable ChatMod JSON bundle
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rule preset import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulePresetImportResult"
        "400":
          description: Invalid or unsupported preset bundle
        "403":
          description: Current plan channel profile limit or advanced-filter entitlement reached
  /rule-presets/templates:
    get:
      summary: List curated moderation rule preset templates
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rule preset template list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RulePresetTemplateList"
  /rule-presets/{id}:
    put:
      summary: Create or replace a moderation rule preset using a stable client id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rule preset upserted
        "403":
          description: Current plan channel profile limit or advanced-filter entitlement reached
    patch:
      summary: Update a moderation rule preset
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Rule preset updated
        "403":
          description: Current plan advanced-filter entitlement reached
    delete:
      summary: Delete a moderation rule preset
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Rule preset deleted
  /stream-sessions:
    get:
      summary: List stream sessions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stream session list
  /stream-sessions/analytics/summary:
    get:
      summary: Summarize cross-stream audit analytics from synced stream-session logs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: profileId
          schema:
            type: string
        - in: query
          name: days
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 30
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Cross-stream analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamSessionAnalyticsSummary"
  /stream-sessions/{id}:
    put:
      summary: Create or update a stream session using a stable phone session id
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stream session upserted
  /stream-sessions/{id}/end:
    post:
      summary: Mark a stream session as ended
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stream session ended
  /stream-sessions/{id}/logs:
    get:
      summary: Get messages, moderation actions, and runtime events for a stream session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Stream session log bundle
  /stream-sessions/{id}/ai-summary:
    get:
      summary: Generate a Creator-gated local heuristic after-stream chat summary
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Local after-stream chat summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamChatSummary"
        "403":
          description: Creator AI chat summary entitlement is required
  /stream-sessions/{id}/export:
    get:
      summary: Export a stream session audit log as JSON or CSV
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: format
          schema:
            type: string
            enum:
              - json
              - csv
            default: json
      responses:
        "200":
          description: Stream session export
  /stream-sessions/{id}/messages:
    post:
      summary: Record or update a YouTube chat message for a stream session
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Chat message recorded
  /stream-sessions/{id}/actions:
    post:
      summary: Record a moderation action with reason and confidence
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Moderation action recorded
  /stream-sessions/{id}/actions/{actionId}/review:
    patch:
      summary: Mark a moderation action review outcome, such as false positive
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Moderation action review saved
  /stream-sessions/{id}/runtime-events:
    post:
      summary: Record a bot runtime event for a stream session
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Runtime event recorded
  /overlays/profiles/{profileId}:
    get:
      summary: Get OBS/browser overlay configuration for a channel profile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profileId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Overlay configuration and entitlement status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverlayConfig"
    put:
      summary: Create or update a Pro-gated OBS/browser overlay configuration
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profileId
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OverlayConfigUpdate"
      responses:
        "200":
          description: Overlay configuration saved; public URL is returned only when a token is created or rotated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverlayConfigMutation"
        "403":
          description: OBS/browser overlay requires Pro or Creator plan
  /overlays/profiles/{profileId}/rotate-token:
    post:
      summary: Rotate the read-only public OBS overlay token
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profileId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Overlay token rotated and a fresh public URL returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverlayConfigMutation"
        "403":
          description: OBS/browser overlay requires Pro or Creator plan
  /overlays/public/{token}:
    get:
      summary: Public read-only HTML overlay for OBS browser sources
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
            pattern: "^cmo_[A-Za-z0-9_-]{32,128}$"
      responses:
        "200":
          description: Transparent-friendly overlay HTML
          content:
            text/html:
              schema:
                type: string
        "404":
          description: Overlay token not found
  /overlays/public/{token}/state:
    get:
      summary: Public read-only overlay state for OBS polling
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
            pattern: "^cmo_[A-Za-z0-9_-]{32,128}$"
      responses:
        "200":
          description: Sanitized overlay state from stream-session audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverlayState"
        "404":
          description: Overlay token not found
  /team/profiles/{profileId}/members:
    get:
      summary: List invited, active, and revoked team moderators for a channel profile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profileId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile team member list and seat limits
          content:
            application/json:
              schema:
                type: object
                required:
                  - profileId
                  - teamSeats
                  - extraSeats
                  - members
                properties:
                  profileId:
                    type: string
                  teamSeats:
                    type: integer
                  extraSeats:
                    type: integer
                  members:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamMember"
  /team/profiles/{profileId}/invites:
    post:
      summary: Create a plan-gated team moderator invite for a channel profile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profileId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInviteCreate"
      responses:
        "201":
          description: Team invite created; invite code is returned once
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamInviteResult"
        "403":
          description: Team moderator seat limit reached for current plan
  /team/profiles/{profileId}/members/{memberId}:
    delete:
      summary: Revoke a team moderator invite or active membership
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: profileId
          required: true
          schema:
            type: string
        - in: path
          name: memberId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Team member revoked
          content:
            application/json:
              schema:
                type: object
                required:
                  - member
                properties:
                  member:
                    $ref: "#/components/schemas/TeamMember"
  /team/invites/redeem:
    post:
      summary: Redeem a team moderator invite on another Android device
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamInviteRedeem"
      responses:
        "200":
          description: Team membership activated for the current device
          content:
            application/json:
              schema:
                type: object
                required:
                  - membership
                properties:
                  membership:
                    $ref: "#/components/schemas/TeamMembership"
        "409":
          description: Invite has already been redeemed by another device
  /team/memberships:
    get:
      summary: List team memberships redeemed by the current device
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active team memberships for this device
          content:
            application/json:
              schema:
                type: object
                required:
                  - memberships
                properties:
                  memberships:
                    type: array
                    items:
                      $ref: "#/components/schemas/TeamMembership"
  /user-profiles:
    get:
      summary: List viewer profiles with warning and strike counts
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: profileId
          schema:
            type: string
      responses:
        "200":
          description: User profile list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileList"
  /user-profiles/warnings:
    post:
      summary: Record a viewer warning and optional live-chat warning message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserWarningRequest"
      responses:
        "201":
          description: User warning recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWarningResult"
  /user-profiles/{id}/notes:
    patch:
      summary: Update moderator notes for a viewer profile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileNotesRequest"
      responses:
        "200":
          description: User profile notes updated
          content:
            application/json:
              schema:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfileSummary"
        "404":
          description: User profile not found
  /user-profiles/{id}/hide:
    post:
      summary: Permanently hide a viewer from the selected live chat
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserHideRequest"
      responses:
        "200":
          description: User hidden from live chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserHideResult"
        "404":
          description: User profile not found
  /user-profiles/{id}/timeout:
    post:
      summary: Temporarily time out a viewer from the selected live chat
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserTimeoutRequest"
      responses:
        "200":
          description: User timed out from live chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTimeoutResult"
        "404":
          description: User profile not found
  /user-profiles/{id}/unban:
    post:
      summary: Undo a ChatMod-created live chat ban or timeout when YouTube returned a saved ban id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUnbanRequest"
      responses:
        "200":
          description: User unbanned from live chat and audited in profile history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserUnbanResult"
        "404":
          description: User profile not found
        "409":
          description: YouTube account is not connected
  /user-profiles/{id}/whitelist:
    post:
      summary: Add a viewer profile to the permanent or temporary whitelist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserWhitelistRequest"
      responses:
        "200":
          description: User added to whitelist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWhitelistResult"
        "404":
          description: User profile not found
  /integrations/discord/webhook:
    get:
      summary: Get safe Discord webhook alert settings for a profile
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: profileId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Discord webhook settings without the raw webhook URL
          content:
            application/json:
              schema:
