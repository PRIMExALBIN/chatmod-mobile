      type: object
      required:
        - used
        - limit
        - remaining
        - resetAt
      properties:
        used:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 0
        remaining:
          type: integer
          minimum: 0
        resetAt:
          type: string
          format: date-time
    ModerationSuggestionReason:
      type: object
      required:
        - code
        - label
        - detail
        - confidence
      properties:
        code:
          type: string
        label:
          type: string
        detail:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
    ModerationDecision:
      type: object
      required:
        - matched
        - actions
      properties:
        matched:
          type: boolean
        actions:
          type: array
          items:
            $ref: "#/components/schemas/ModerationAction"
    ModerationAction:
      type: object
      required:
        - type
        - reason
        - confidence
      properties:
        type:
          type: string
          enum:
            - allow
            - flagForReview
            - deleteMessage
            - timeoutUser
            - hideUser
            - sendAutoReply
        reason:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        text:
          type:
            - string
            - "null"
          maxLength: 200
