          $ref: "#/components/schemas/ModerationProfile"
        context:
          type: object
          properties:
            recentMessages:
              type: array
              maxItems: 50
              items:
                $ref: "#/components/schemas/ChatMessage"
        options:
          type: object
          properties:
            confidenceThreshold:
              type: number
              minimum: 0
              maximum: 1
              default: 0.65
            manualApprovalRequired:
              type: boolean
              enum:
                - true
              default: true
    ModerationSuggestionResult:
      type: object
      required:
        - provider
        - manualApprovalRequired
        - suggestedAction
        - classification
        - confidence
        - confidenceThreshold
        - reasons
        - explanation
        - usage
      properties:
        provider:
          type: string
          enum:
            - local-heuristic
        manualApprovalRequired:
          type: boolean
          enum:
            - true
        suggestedAction:
          type: string
          enum:
            - allow
            - flagForReview
            - deleteMessage
            - timeoutUser
            - hideUser
        classification:
          type: array
          items:
            type: string
            enum:
              - spam
              - toxicity
              - repeated_question
              - policy
              - safe
        confidence:
          type: number
          minimum: 0
          maximum: 1
        confidenceThreshold:
          type: number
          minimum: 0
          maximum: 1
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/ModerationSuggestionReason"
        explanation:
          type: string
        usage:
          $ref: "#/components/schemas/ModerationSuggestionUsage"
