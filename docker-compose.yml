services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatmod
      POSTGRES_PASSWORD: chatmod
      POSTGRES_DB: chatmod
    ports:
      - "5432:5432"
    volumes:
      - chatmod_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - chatmod_redis:/data

volumes:
  chatmod_postgres:
  chatmod_redis:
